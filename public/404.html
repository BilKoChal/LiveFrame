<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveFrame — Instant Browser Editor</title>
    <script>
      // SPA redirect trick for GitHub Pages
      // When a 404 occurs, GitHub Pages serves this file.
      // We take the path from the URL and encode it as a query parameter,
      // then redirect to index.html which will read it and set the correct route.
      var pathSegmentsToKeep = 1; // Number of path segments for the repo (e.g., /LiveFrame/ = 1)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
